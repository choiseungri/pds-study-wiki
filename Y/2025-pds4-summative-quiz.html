<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2025 PDS4 총괄평가 퀴즈</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f5f8;
      --panel: #ffffff;
      --ink: #182230;
      --muted: #667085;
      --line: #d6dce6;
      --blue: #2563eb;
      --blue-soft: #eaf1ff;
      --green: #07875f;
      --green-soft: #e8f7f0;
      --red: #c23b3b;
      --red-soft: #fff0f0;
      --amber: #9a6700;
      --amber-soft: #fff7dd;
      --navy: #111827;
      --shadow: 0 18px 45px rgba(17, 24, 39, 0.08);
      --soft-shadow: 0 8px 22px rgba(17, 24, 39, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 20% -10%, rgba(37, 99, 235, 0.12), transparent 34%),
        linear-gradient(180deg, #f8fafc 0%, var(--bg) 260px);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      line-height: 1.55;
    }

    button,
    select {
      font: inherit;
    }

    .shell {
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
    }

    header {
      padding: 38px 0 24px;
      background: rgba(255, 255, 255, 0.78);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .topline {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .eyebrow {
      margin: 0;
      color: var(--blue);
      font-weight: 700;
      font-size: 0.86rem;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 4vw, 2.6rem);
      letter-spacing: 0;
      line-height: 1.15;
      color: var(--navy);
    }

    .summary {
      max-width: 760px;
      margin: 12px 0 0;
      color: var(--muted);
    }

    .status {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 24px;
    }

    .metric {
      min-height: 92px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--soft-shadow);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .metric strong {
      display: block;
      margin-top: 6px;
      font-size: 1.65rem;
      line-height: 1.1;
      color: var(--navy);
    }

    .toolbar-band {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 10px 0;
      background: rgba(243, 245, 248, 0.92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1.3fr) minmax(180px, 0.8fr) auto auto auto;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border: 1px solid rgba(214, 220, 230, 0.9);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: var(--soft-shadow);
    }

    .control {
      display: grid;
      gap: 5px;
    }

    .control span {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
    }

    input[type="search"],
    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #ffffff;
      color: var(--ink);
      padding: 0 12px;
      outline: none;
    }

    input[type="search"]:focus,
    select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(47, 111, 235, 0.14);
    }

    .tool-button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #ffffff;
      color: var(--ink);
      padding: 0 14px;
      cursor: pointer;
      white-space: nowrap;
    }

    .tool-button.primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #ffffff;
      font-weight: 700;
    }

    .tool-button:hover {
      border-color: var(--blue);
    }

    main {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
      padding: 24px 0 48px;
    }

    .source-board {
      position: sticky;
      top: 92px;
      display: grid;
      gap: 8px;
      max-height: calc(100vh - 112px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      padding: 10px;
      box-shadow: var(--soft-shadow);
    }

    .source-chip {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 12px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease;
    }

    .source-chip:hover {
      border-color: rgba(37, 99, 235, 0.55);
      transform: translateY(-1px);
    }

    .source-chip[aria-pressed="true"] {
      border-color: var(--blue);
      background: var(--blue-soft);
      box-shadow: inset 3px 0 0 var(--blue);
    }

    .source-chip strong {
      display: block;
      font-size: 0.92rem;
      line-height: 1.35;
    }

    .source-chip span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .quiz-list {
      display: grid;
      gap: 14px;
    }

    .question-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .question-card.correct {
      border-color: rgba(15, 138, 95, 0.55);
    }

    .question-card.incorrect {
      border-color: rgba(196, 61, 61, 0.55);
    }

    .question-head {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px;
      background: linear-gradient(180deg, #ffffff, #f8fafc);
      border-bottom: 1px solid var(--line);
    }

    .q-number {
      display: inline-grid;
      place-items: center;
      min-width: 42px;
      height: 30px;
      border-radius: 999px;
      background: var(--navy);
      color: #ffffff;
      font-weight: 800;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border-radius: 999px;
      padding: 0 9px;
      background: #eef2f7;
      color: #34435a;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .badge.source {
      background: var(--blue-soft);
      color: #174ea6;
    }

    .badge.warning {
      background: var(--amber-soft);
      color: var(--amber);
    }

    .question-body {
      padding: 18px;
    }

    .stem {
      margin: 0 0 16px;
      white-space: pre-line;
      font-weight: 650;
      color: #202b3c;
    }

    .options {
      display: grid;
      gap: 9px;
    }

    .option {
      display: grid;
      grid-template-columns: 30px 1fr;
      gap: 11px;
      align-items: start;
      width: 100%;
      min-height: 50px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 11px 13px;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease;
    }

    .option:hover {
      border-color: var(--blue);
      background: #fbfdff;
      transform: translateY(-1px);
    }

    .option.selected {
      border-color: var(--blue);
      background: var(--blue-soft);
    }

    .option.answer {
      border-color: var(--green);
      background: var(--green-soft);
    }

    .option.wrong {
      border-color: var(--red);
      background: var(--red-soft);
    }

    .mark {
      display: inline-grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: #eef2f7;
      font-weight: 800;
      color: #364152;
    }

    .feedback {
      display: none;
      margin-top: 14px;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.92rem;
    }

    .feedback.visible {
      display: block;
    }

    .feedback.correct {
      background: var(--green-soft);
      color: var(--green);
    }

    .feedback.incorrect {
      background: var(--red-soft);
      color: var(--red);
    }

    .feedback.pending {
      background: var(--amber-soft);
      color: var(--amber);
    }

    .empty {
      padding: 28px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--muted);
      text-align: center;
    }

    footer {
      padding: 24px 0 36px;
      color: var(--muted);
      border-top: 1px solid var(--line);
      background: #ffffff;
      font-size: 0.9rem;
    }

    @media (max-width: 900px) {
      .status {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .toolbar {
        grid-template-columns: 1fr 1fr;
      }

      .toolbar .tool-button {
        width: 100%;
      }
    }

    @media (max-width: 620px) {
      .shell {
        width: min(100% - 20px, 1160px);
      }

      .status,
      .toolbar {
        grid-template-columns: 1fr;
      }

      .question-head {
        align-items: flex-start;
      }
    }

    @media (max-width: 980px) {
      main {
        grid-template-columns: 1fr;
      }

      .source-board {
        position: static;
        max-height: none;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      }
    }
  </style>
</head>

  <header>
    <div class="shell">
      <div class="topline">
        <div>
          <p class="eyebrow">PDS4 CBT 복기</p>
          <h1>2025학년도 환자.의사.사회4 총괄평가</h1>
        </div>
      </div>
      <p class="summary">

  </header>

  <section class="toolbar-band">

  </section>

  <main class="shell">
    <section class="source-board" id="source-board" aria-label="출처 강의별 필터"></section>
    <section class="quiz-list" id="quiz-list" aria-label="퀴즈 문항"></section>
  </main>

    </div>
  </footer>

    questions.forEach(question => {
      question.shuffledOptions = shuffleOptions(question.options.map((text, index) => ({
        text,
        originalNumber: index + 1,
        correct: question.answers.includes(index + 1)
      })));
    });

    const state = {
      source: "전체",
      query: "",
      onlyUnanswered: false,
      selections: new Map(),
      showAnswers: false
    };

    const els = {
      totalCount: document.querySelector("#total-count"),
      visibleCount: document.querySelector("#visible-count"),
      answeredCount: document.querySelector("#answered-count"),
      scoreRate: document.querySelector("#score-rate"),
      searchInput: document.querySelector("#search-input"),
      sourceSelect: document.querySelector("#source-select"),
      sourceBoard: document.querySelector("#source-board"),
      quizList: document.querySelector("#quiz-list"),
      toggleUnanswered: document.querySelector("#toggle-unanswered"),
      showAnswers: document.querySelector("#show-answers"),
      reset: document.querySelector("#reset")
    };

    const numberMarks = ["①", "②", "③", "④", "⑤", "⑥"];

    function init() {
      els.totalCount.textContent = String(questions.length);
      renderSourceControls();
      bindEvents();
      render();
    }

    function bindEvents() {
      els.searchInput.addEventListener("input", event => {
        state.query = event.target.value.trim();
        render();
      });

      els.sourceSelect.addEventListener("change", event => {
        state.source = event.target.value;
        render();
      });

      els.toggleUnanswered.addEventListener("click", () => {
        state.onlyUnanswered = !state.onlyUnanswered;
        els.toggleUnanswered.setAttribute("aria-pressed", String(state.onlyUnanswered));
        els.toggleUnanswered.textContent = state.onlyUnanswered ? "전체 보기" : "미풀이만";
        render();
      });

      els.showAnswers.addEventListener("click", () => {
        state.showAnswers = !state.showAnswers;
        els.showAnswers.textContent = state.showAnswers ? "정답 숨김" : "정답 표시";
        render();
      });

      els.reset.addEventListener("click", () => {
        state.selections.clear();
        state.showAnswers = false;
        els.showAnswers.textContent = "정답 표시";
        render();
      });
    }

    function renderSourceControls() {
      const sources = ["전체", ...Array.from(new Set(questions.map(item => item.source)))];
      els.sourceSelect.replaceChildren(...sources.map(source => {
        const option = document.createElement("option");
        option.value = source;
        option.textContent = source === "전체" ? "전체 강의" : source;
        return option;
      }));
    }

    function render() {
      const visible = getVisibleQuestions();
      els.visibleCount.textContent = String(visible.length);
      renderStats();
      renderSourceBoard();
      renderQuestions(visible);
    }

    function renderStats() {
      const answered = questions.filter(question => state.selections.has(question.id));
      const correct = answered.filter(question => isCorrect(question, state.selections.get(question.id))).length;
      els.answeredCount.textContent = String(answered.length);
      els.scoreRate.textContent = answered.length ? `${Math.round((correct / answered.length) * 100)}%` : "0%";
    }

    function getVisibleQuestions() {
      const normalizedQuery = normalize(state.query);
      return questions.filter(question => {
        const sourceOk = state.source === "전체" || question.source === state.source;
        const unansweredOk = !state.onlyUnanswered || !state.selections.has(question.id);
        const queryOk = !normalizedQuery || normalize([
          question.stem,
          question.source,
          question.professor,
          question.options.join(" ")
        ].join(" ")).includes(normalizedQuery);
        return sourceOk && unansweredOk && queryOk;
      });
    }

    function renderSourceBoard() {
      const grouped = questions.reduce((map, question) => {
        map.set(question.source, (map.get(question.source) || 0) + 1);
        return map;
      }, new Map());

      const buttons = [
        createSourceButton("전체", questions.length),
        ...Array.from(grouped, ([source, count]) => createSourceButton(source, count))
      ];
      els.sourceBoard.replaceChildren(...buttons);
    }

    function createSourceButton(source, count) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "source-chip";
      button.setAttribute("aria-pressed", String(state.source === source));
      button.innerHTML = `
        <strong>${escapeHtml(source === "전체" ? "전체 강의" : source)}</strong>
        <span>${count}문항</span>
      `;
      button.addEventListener("click", () => {
        state.source = source;
        els.sourceSelect.value = source;
        render();
      });
      return button;
    }

    function renderQuestions(items) {
      if (!items.length) {
        els.quizList.innerHTML = `<div class="empty">현재 조건에 맞는 문항이 없습니다.</div>`;
        return;
      }

      els.quizList.replaceChildren(...items.map(createQuestionCard));
    }

    function createQuestionCard(question) {
      const selected = state.selections.get(question.id);
      const answered = Number.isInteger(selected);
      const correct = answered && isCorrect(question, selected);
      const reveal = state.showAnswers || answered;

      const card = document.createElement("article");
      card.className = "question-card";
      if (answered) card.classList.add(correct ? "correct" : "incorrect");

      const badges = [
        `<span class="badge source">${escapeHtml(question.source)}</span>`,
        `<span class="badge">${escapeHtml(question.professor)}</span>`
      ];
      if (question.disputed) badges.push(`<span class="badge warning">답 논란</span>`);
      if (question.uncertain) badges.push(`<span class="badge warning">검토 필요</span>`);

      card.innerHTML = `
        <div class="question-head">
          <span class="q-number">Q${question.id}</span>
          <div class="badges">${badges.join("")}</div>
        </div>
        <div class="question-body">
          <p class="stem">${escapeHtml(question.stem)}</p>
          <div class="options"></div>
          <div class="feedback"></div>
        </div>
      `;

      const optionWrap = card.querySelector(".options");
      optionWrap.replaceChildren(...question.shuffledOptions.map((option, index) => {
        const displayNumber = index + 1;
        const isSelected = selected === option.originalNumber;
        const isAnswer = option.correct;
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";
        if (isSelected) button.classList.add("selected");
        if (reveal && isAnswer) button.classList.add("answer");
        if (answered && isSelected && !isAnswer) button.classList.add("wrong");
        button.innerHTML = `<span class="mark">${numberMarks[index]}</span><span>${escapeHtml(option.text)}</span>`;
        button.addEventListener("click", () => {
          state.selections.set(question.id, option.originalNumber);
          render();
          document.querySelector(`[data-question-id="${question.id}"]`)?.scrollIntoView({ block: "nearest" });
        });
        return button;
      }));

      card.dataset.questionId = String(question.id);
      const feedback = card.querySelector(".feedback");
      if (reveal) {
        const answerText = question.shuffledOptions
          .map((option, index) => ({ option, index }))
          .filter(item => item.option.correct)
          .map(item => `${numberMarks[item.index]} ${item.option.text}`)
          .join(" / ");
        feedback.className = `feedback visible ${answered ? (correct ? "correct" : "incorrect") : "pending"}`;
        feedback.innerHTML = `
          <strong>${answered ? (correct ? "정답" : "오답") : "정답"}</strong>
          <div>정답: ${escapeHtml(answerText)}</div>
          ${question.note ? `<div>${escapeHtml(question.note)}</div>` : ""}
        `;
      }

      return card;
    }

    function isCorrect(question, selected) {
      return question.answers.includes(selected);
    }

    function shuffleOptions(options) {
      const items = [...options];
      for (let index = items.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [items[index], items[swapIndex]] = [items[swapIndex], items[index]];
      }
      return items;
    }

    function normalize(value) {
      return String(value || "").toLowerCase().replace(/\s+/g, " ").trim();
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    init();
  </script>
